<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Carrois+Gothic">
	<title>Alisom</title>
	<style>

		* {
			box-sizing: border-box;
			margin: 0px;
			padding: 0px;
			font-family: Carrois Gothic;
		}

		header {
			background-color: #000000;
			display: flex;
  			justify-content: center;
 			align-items: center;
 			padding: 10px;
		}

		nav {
			position: -webkit-sticky;
			position: sticky;
			top: 0;
 			z-index: 1000;
  			width: 100%;
		}

		nav ul {
  			display: flex;
  			justify-content: center;
  			list-style: none;
  			padding: 0;
  			margin: 0;
		}

		ul.navegador {
			list-style-type: none;
			overflow: hidden;
			background-color: #fc0000;
		}

		ul.navegador li{
			float: left;
		}

		nav li a:hover:not(.active){
			color: #000000;
		}

		nav li a{
			display: block;
			color: #FFFFFF;
			font-size: 20px;
			padding: 18px 20px;
			text-decoration: none;
    		position: relative;
		}

		nav li a::after{
			content: '';
    		position: absolute;
    		width: 0;
   	 		height: 2px;
    		bottom: 0;
    		left: 50%;
    		background-color: #FFFFFF;
    		transition: all 0.3s ease;
			text-decoration: underline; 
			color: #fc0000;
		}

		nav li a:hover::after{
			width: 100%;
    		left: 0;
		}

		body {
			background-image: url(Imagens/studio.jpg);
			background-repeat: no-repeat;
			background-size: cover;
			display: flex;
 			flex-direction: column;
		}

		main {
			color: #ff9100;
			margin-left: 20%;
			margin-right: 20%;
			padding: 20px;
		}

		h1, p {
			margin: 3%;
			paddin: 2px;
		}

		div.content {
			margin-top: 2%;
			list-style-type: none;
			margin: 2%;
			padding: 20px;
			background-color: #000000;
			border-radius: 10px;
			text-align: justify;
		}

			input[type="text"], input[type="email"], input[type="date"], input[type="time"], select {
			padding: 10px;
    		border: 2px solid #ccc;   
    		border-radius: 5px;       
    		box-sizing: border-box;
    		background-color: #000000;
    		color: #FFFFFF;    
}

		textarea {
    		border: 2px solid #ccc;     /* Borda padrão */
    		border-radius: 4px;         /* Bordas arredondadas */
    		background-color: #f8f8f8;  /* Cor de fundo */
    		font-size: 16px;
    		background-color: #000000;
    		color: #FFFFFF;            /* Tamanho da fonte */
}

		footer{ 
			background-color: #fc0000;
			color: white;
			width: 100%;
			flex-shrink: 0px;
		}

		ul.foot {
			margin: 0;
			padding: 10px;
		}

		ul.foot li a {
			text-decoration: none;
			color: #FFFFFF;
		}

		ul {
			list-style-type: none;
		}


		@media screen and (max-width: 900px) {
				ul.navegador li{float: none;}
				ul.navegador li a{font-family: Carrois Gothic;}

		nav ul {
			flex-direction: column;
  			align-items: center;
  			list-style: none;
  			padding: 0;
  			margin: 0;
			}


			h1 {
			text-align: center;
			}

			main {
			color: #ff9100;
			margin-left: 10%;
			margin-right: 10%;
			padding: 20px;
			}

			div.content {
			margin-top: 2%;
			width: 100%;
			}

			fieldset, form, textarea, input {
			width: 100%;
			}
		}
	</style>
</head>
<body>
	<header>
	<div class="container">
		<a href="index.html" id="logo" class="logo"><img src="Imagens/Alisom2.png" alt="Alisom" width="200px"></a>
	</div>
	</header>
	<nav>
		<ul class="navegador">
			<li><a href="index.html">Início</a></li>
			<li><a href="Estudio.html">Conheça nosso estúdio</a></li>
			<li><a href="Contato.html">Contato</a></li>
		</ul>
	</nav>
	<main>
		<div class="content">
			<h1>Fale conosco</h1>
			<fieldset>
			<form action="https://formsubmit.co/seu-email@exemplo.com" method="POST">
    		<p><label for="nome">Nome: </label><input type="text" name="nome" placeholder="Digite seu nome" size="50"></p>
    		<br>
			<p><label for="email">E-mail: </label><input type="email" name="e-mail" placeholder="Digite seu e-mail" size="50"></p>
			<br>
			<p>Assunto: <select name="assunto">
					<option value=""></option>
					<option value="Negocios">Negócios</option>
					<option value="Jurídico">Jurídico</option>
					<option value="Artistas">Artistas</option>
				</select></p>
			<br>
    		<p><label for="mensagem">Mensagem:</label></p>
    		<p><textarea name="mensagem" rows="30" cols="60"></textarea></p>
			<p><input type="submit" value="Enviar" name="submit" style="background-color: #fc0000; padding: 10px 20px; color: white;cursor: pointer; border-radius: 5px; display: inline-block;"></p>
			</form>
			</fieldset>
		</div>
	</main>
	<footer>
		<small>
			<center>
			<ul class="foot">
				<li><a href="#">Políticas de privacidade</a></li>
				<li><a href="#">Políticas de Inteligência artificial</a></li>
				<li><a href="#">Termos de uso</a></li>
			</ul>
			</center>
			<div class="redes sociais">
			<center>
				<a href="https://instagram.com/alisommusic"><img src="Imagens/instagram.png" alt="instagram" width="30px"></a>
				<a href="#"><img src="Imagens/spotify.png" alt="instagram" width="30px"></a>
			</center>
			</div>
			<p class="foo"><center>© 2026 Alisom Produções Artísticas. Todos os direitos reservados</center></p>
		</small>
	</footer>
</body>
</html>
